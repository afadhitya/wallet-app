version: 2

project_name: wallet

builds:
  - id: wallet
    main: ./cmd/wallet
    binary: wallet
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - formats: ['tar.gz']
    name_template: "wallet_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: 'checksums.txt'

changelog:
  use: github-native

release:
  github:
    owner: afadhitya
    name: wallet-app
